<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - BelajarYuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; background: #0f172a; }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }
        .table-wrapper { overflow-x: auto; }
        table { min-width: 600px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">

    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-blue-400 text-4xl">shield_person</span>
                    Panel Admin
                </h1>
                <p class="text-slate-400 mt-1">Kelola pengguna dan materi belajar</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-800 rounded-full px-4 py-2 shadow-md">
                <span class="material-symbols-outlined text-slate-400">account_circle</span>
                <span id="adminName" class="font-medium">Admin</span>
                <button onclick="logout()" class="ml-2 bg-red-600/80 hover:bg-red-600 px-4 py-1.5 rounded-full text-sm font-semibold flex items-center gap-1 transition">
                    <span class="material-symbols-outlined text-base">logout</span>
                    Logout
                </button>
            </div>
        </div>

        <!-- Statistik Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-gradient-to-br from-slate-800 to-slate-800/80 rounded-2xl p-6 card-hover border border-slate-700">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-slate-400 text-sm">Total Pengguna</p>
                        <p id="totalUsers" class="text-5xl font-bold text-blue-400 mt-2">0</p>
                    </div>
                    <span class="material-symbols-outlined text-6xl text-blue-500/60">group</span>
                </div>
            </div>
            <div class="bg-gradient-to-br from-slate-800 to-slate-800/80 rounded-2xl p-6 card-hover border border-slate-700">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-slate-400 text-sm">Total Materi</p>
                        <p id="totalMateri" class="text-5xl font-bold text-purple-400 mt-2">0</p>
                    </div>
                    <span class="material-symbols-outlined text-6xl text-purple-500/60">menu_book</span>
                </div>
            </div>
        </div>

        <!-- Daftar Pengguna -->
        <div class="bg-slate-800/60 rounded-2xl overflow-hidden mb-10 border border-slate-700">
            <div class="bg-slate-800 px-6 py-4 border-b border-slate-700">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-blue-400">people</span>
                    Daftar Pengguna
                </h2>
            </div>
            <div class="table-wrapper">
                <table class="w-full text-left">
                    <thead class="bg-slate-700/50 text-slate-300">
                        <tr>
                            <th class="px-6 py-3 text-sm font-semibold">Nama</th>
                            <th class="px-6 py-3 text-sm font-semibold">Email</th>
                            <th class="px-6 py-3 text-sm font-semibold">Role</th>
                            <th class="px-6 py-3 text-sm font-semibold">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="4" class="text-center py-8 text-slate-400">Memuat data pengguna...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Daftar Materi -->
        <div class="bg-slate-800/60 rounded-2xl overflow-hidden border border-slate-700">
            <div class="bg-slate-800 px-6 py-4 border-b border-slate-700">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-purple-400">library_books</span>
                    Semua Materi
                </h2>
            </div>
            <div class="table-wrapper">
                <table class="w-full text-left">
                    <thead class="bg-slate-700/50 text-slate-300">
                        <tr>
                            <th class="px-6 py-3 text-sm font-semibold">Judul</th>
                            <th class="px-6 py-3 text-sm font-semibold">Tipe</th>
                            <th class="px-6 py-3 text-sm font-semibold">Pemilik</th>
                            <th class="px-6 py-3 text-sm font-semibold">Tanggal</th>
                            <th class="px-6 py-3 text-sm font-semibold">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="materiTableBody">
                        <tr><td colspan="5" class="text-center py-8 text-slate-400">Memuat data materi...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi API (sesuaikan dengan URL backend Anda)
        const API_BASE = "https://belajaryuk-production.up.railway.app/api";
        
        // Helper untuk mengambil token dan user dari localStorage
        const token = localStorage.getItem('token');
        let currentUser = null;
        try {
            currentUser = JSON.parse(localStorage.getItem('user'));
        } catch(e) { console.error(e); }

        // Validasi akses admin
        if (!token || !currentUser || currentUser.role !== 'admin') {
            alert('Akses ditolak. Anda bukan admin.');
            window.location.href = 'login.html';
        }

        // Tampilkan nama admin di header
        if (currentUser && currentUser.name) {
            document.getElementById('adminName').innerText = currentUser.name;
        }

        // Fungsi fetch dengan token
        async function fetchAPI(endpoint, options = {}) {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'x-auth-token': token,
                    ...options.headers
                }
            });
            if (!res.ok) {
                const errorText = await res.text();
                throw new Error(errorText || `HTTP ${res.status}`);
            }
            return res.json();
        }

        // Hapus user
        async function deleteUser(userId, rowElement) {
            if (!confirm('Yakin ingin menghapus pengguna ini? Semua materi miliknya juga akan terhapus.')) return;
            try {
                await fetchAPI(`/admin/users/${userId}`, { method: 'DELETE' });
                // Hapus baris dari tabel
                if (rowElement) rowElement.remove();
                // Update total user
                const currentTotal = parseInt(document.getElementById('totalUsers').innerText) || 0;
                document.getElementById('totalUsers').innerText = currentTotal - 1;
                alert('Pengguna berhasil dihapus.');
            } catch (err) {
                alert('Gagal menghapus pengguna: ' + err.message);
            }
        }

        // Hapus materi
        async function deleteMateri(materiId, rowElement) {
            if (!confirm('Yakin ingin menghapus materi ini?')) return;
            try {
                await fetchAPI(`/admin/materi/${materiId}`, { method: 'DELETE' });
                if (rowElement) rowElement.remove();
                const currentTotal = parseInt(document.getElementById('totalMateri').innerText) || 0;
                document.getElementById('totalMateri').innerText = currentTotal - 1;
                alert('Materi berhasil dihapus.');
            } catch (err) {
                alert('Gagal menghapus materi: ' + err.message);
            }
        }

        // Load daftar pengguna
        async function loadUsers() {
            try {
                const users = await fetchAPI('/admin/users');
                document.getElementById('totalUsers').innerText = users.length;
                const tbody = document.getElementById('userTableBody');
                if (!users.length) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-slate-400">Belum ada pengguna</td></tr>';
                    return;
                }
                tbody.innerHTML = users.map(user => `
                    <tr class="border-b border-slate-700/50 hover:bg-slate-700/30 transition" data-user-id="${user._id}">
                        <td class="px-6 py-3 font-medium">${escapeHtml(user.name || '-')}</td>
                        <td class="px-6 py-3">${escapeHtml(user.email)}</td>
                        <td class="px-6 py-3">
                            <span class="px-2 py-1 rounded-full text-xs font-semibold ${user.role === 'admin' ? 'bg-purple-600/30 text-purple-300' : 'bg-green-600/30 text-green-300'}">
                                ${user.role === 'admin' ? 'Admin' : 'User'}
                            </span>
                        </td>
                        <td class="px-6 py-3">
                            ${user.role !== 'admin' ? `<button onclick="deleteUser('${user._id}', this.closest('tr'))" class="text-red-400 hover:text-red-300 text-sm flex items-center gap-1"><span class="material-symbols-outlined text-base">delete</span> Hapus</button>` : '<span class="text-slate-500 text-sm">-</span>'}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('userTableBody').innerHTML = '<tr><td colspan="4" class="text-center py-8 text-red-400">Gagal memuat data pengguna</td></tr>';
            }
        }

        // Load daftar materi
        async function loadMateri() {
            try {
                const materiList = await fetchAPI('/admin/materi');
                document.getElementById('totalMateri').innerText = materiList.length;
                const tbody = document.getElementById('materiTableBody');
                if (!materiList.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-slate-400">Belum ada materi</td></tr>';
                    return;
                }
                tbody.innerHTML = materiList.map(m => `
                    <tr class="border-b border-slate-700/50 hover:bg-slate-700/30 transition">
                        <td class="px-6 py-3">${escapeHtml(m.title || 'Tanpa judul')}</td>
                        <td class="px-6 py-3 capitalize">${m.type || 'document'}</td>
                        <td class="px-6 py-3">${m.userId ? escapeHtml(m.userId.name || m.userId.email || 'Unknown') : 'Unknown'}</td>
                        <td class="px-6 py-3 text-sm">${m.createdAt ? new Date(m.createdAt).toLocaleDateString() : '-'}</td>
                        <td class="px-6 py-3">
                            <button onclick="deleteMateri('${m._id}', this.closest('tr'))" class="text-red-400 hover:text-red-300 text-sm flex items-center gap-1">
                                <span class="material-symbols-outlined text-base">delete</span> Hapus
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('materiTableBody').innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-400">Gagal memuat data materi</td></tr>';
            }
        }

        // Fungsi logout
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Helper sederhana untuk mencegah XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Inisialisasi
        loadUsers();
        loadMateri();
    </script>
</body>
</html>
